<svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1b2e"/>
      <stop offset="1" stop-color="#10263f"/>
    </linearGradient>
    <linearGradient id="loc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c14b"/><stop offset="1" stop-color="#d49a1f"/>
    </linearGradient>
    <linearGradient id="svc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2bbfae"/><stop offset="1" stop-color="#179285"/>
    </linearGradient>
    <linearGradient id="res" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f86cf"/><stop offset="1" stop-color="#2767a8"/>
    </linearGradient>
    <linearGradient id="pty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8268c4"/><stop offset="1" stop-color="#5f47a0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#cdd9e6"/>
    </marker>
  </defs>

  <rect width="1060" height="780" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="48" fill="#ffffff" font-size="24" font-weight="700">TMF SID / eTOM Conceptual Pyramid</text>
  <text x="40" y="74" fill="#8fb4d6" font-size="14.5">Neo4j digital twin · 7 ODA components · 4 SID layers · cross-domain joints from LOCATION_RESOURCE_SERVICE_PARTY</text>

  <!-- ===== JOINT ARCS (drawn first, behind tiers) ===== -->
  <g fill="none" stroke-width="2.4" opacity="0.92">
    <!-- Service -> Location : ServicePlaceDetails -->
    <path d="M540,250 C660,210 640,150 486,150" stroke="#2bbfae" marker-end="url(#arrow)"/>
    <!-- Service -> Resource : Service<->Resource -->
    <path d="M548,258 C700,300 690,330 624,360" stroke="#7fd3c8" marker-end="url(#arrow)"/>
    <!-- Resource -> Location : PlaceLocatesResource -->
    <path d="M626,362 C880,300 840,150 492,146" stroke="#3f86cf" marker-end="url(#arrow)"/>
    <!-- Party -> Location : PlacePartyRoleAssoc -->
    <path d="M700,470 C1010,380 960,150 498,142" stroke="#8268c4" marker-end="url(#arrow)"/>
  </g>
  <!-- arc labels -->
  <g font-size="12.5" font-weight="600">
    <text x="648" y="186" fill="#2bbfae">ServicePlaceDetails</text>
    <text x="706" y="322" fill="#7fd3c8">Service &#8596; Resource</text>
    <text x="828" y="250" fill="#6fb0e6">PlaceLocatesResource</text>
    <text x="906" y="372" fill="#a892da">PlacePartyRoleAssoc</text>
  </g>

  <!-- ===== PYRAMID TIERS (cx = 380) ===== -->
  <!-- Tier 1 Location : y 90-188, half 70/130 -->
  <polygon points="310,90 450,90 510,188 250,188" fill="url(#loc)" stroke="#0b1b2e" stroke-width="2"/>
  <text x="380" y="126" text-anchor="middle" fill="#3a2b04" font-size="19" font-weight="700">LOCATION</text>
  <text x="380" y="148" text-anchor="middle" fill="#3a2b04" font-size="12.5" font-weight="600">TMFC014 · Location ABE</text>
  <text x="380" y="167" text-anchor="middle" fill="#5a430a" font-size="11">exposes TMF673 / 674 / 675</text>

  <!-- Tier 2 Service : y 200-298, half 140/200 -->
  <polygon points="240,200 520,200 580,298 180,298" fill="url(#svc)" stroke="#0b1b2e" stroke-width="2"/>
  <text x="380" y="236" text-anchor="middle" fill="#04201d" font-size="19" font-weight="700">SERVICE</text>
  <text x="380" y="258" text-anchor="middle" fill="#04201d" font-size="12.5" font-weight="600">TMFC008 · Service ABE (CFS / RFS)</text>
  <text x="380" y="277" text-anchor="middle" fill="#063b35" font-size="11">exposes TMF638 · FF-628 service&#8594;resource</text>

  <!-- Tier 3 Resource : y 310-408, half 210/270 -->
  <polygon points="170,310 590,310 650,408 110,408" fill="url(#res)" stroke="#0b1b2e" stroke-width="2"/>
  <text x="380" y="346" text-anchor="middle" fill="#05192b" font-size="19" font-weight="700">RESOURCE</text>
  <text x="380" y="368" text-anchor="middle" fill="#05192b" font-size="12.5" font-weight="600">TMFC012 · Resource ABE (Physical / Logical / Compound)</text>
  <text x="380" y="387" text-anchor="middle" fill="#0a2f4e" font-size="11">exposes TMF639 · depends TMF634</text>

  <!-- Tier 4 Party : y 420-518, half 280/340 -->
  <polygon points="100,420 660,420 720,518 40,518" fill="url(#pty)" stroke="#0b1b2e" stroke-width="2"/>
  <text x="380" y="452" text-anchor="middle" fill="#160e2b" font-size="19" font-weight="700">PARTY</text>
  <text x="380" y="473" text-anchor="middle" fill="#160e2b" font-size="12" font-weight="600">TMFC028 Party · TMFC020 Identity · TMFC023 Interaction · TMFC035 Roles &amp; Perms</text>
  <text x="380" y="491" text-anchor="middle" fill="#2a1d50" font-size="11">exposes TMF632 / 669 / 672 / 720 / 683</text>
  <text x="380" y="508" text-anchor="middle" fill="#2a1d50" font-size="10.5">Party ABE · Customer / Roles / Permission BEs</text>

  <!-- ===== Function-block side tags ===== -->
  <g font-size="11" font-weight="600">
    <rect x="724" y="120" width="120" height="20" rx="10" fill="#1d3754" stroke="#3f86cf"/>
    <text x="784" y="134" text-anchor="middle" fill="#bcd6ef">Production Domain</text>
    <line x1="724" y1="130" x2="512" y2="139" stroke="#3f86cf" stroke-width="1" opacity="0.4"/>
    <rect x="730" y="470" width="150" height="20" rx="10" fill="#2c2150" stroke="#8268c4"/>
    <text x="805" y="484" text-anchor="middle" fill="#cbbce8">Party Management block</text>
    <line x1="730" y1="480" x2="722" y2="480" stroke="#8268c4" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(40,560)">
    <rect x="0" y="0" width="980" height="180" rx="10" fill="#0e2138" stroke="#26405d"/>
    <text x="20" y="30" fill="#ffffff" font-size="15" font-weight="700">Legend &amp; twin status</text>

    <!-- block colour key -->
    <rect x="20" y="48" width="16" height="16" rx="3" fill="url(#loc)"/><text x="44" y="61" fill="#cdd9e6" font-size="12.5">Location (Production)</text>
    <rect x="20" y="72" width="16" height="16" rx="3" fill="url(#svc)"/><text x="44" y="85" fill="#cdd9e6" font-size="12.5">Service (Production)</text>
    <rect x="20" y="96" width="16" height="16" rx="3" fill="url(#res)"/><text x="44" y="109" fill="#cdd9e6" font-size="12.5">Resource (Production)</text>
    <rect x="20" y="120" width="16" height="16" rx="3" fill="url(#pty)"/><text x="44" y="133" fill="#cdd9e6" font-size="12.5">Party (Party Management)</text>

    <!-- joints key -->
    <text x="300" y="61" fill="#9fb8d0" font-size="12.5">&#8594; arrows = DEPENDS_ON joints (SID associations):</text>
    <text x="318" y="84" fill="#2bbfae" font-size="12">• Service &#8594; Location  (ServicePlaceDetails)</text>
    <text x="318" y="104" fill="#7fd3c8" font-size="12">• Service &#8594; Resource  (FF-628 / TMF639)</text>
    <text x="318" y="124" fill="#6fb0e6" font-size="12">• Resource &#8594; Location  (PlaceLocatesResource)</text>
    <text x="318" y="144" fill="#a892da" font-size="12">• Party &#8594; Location  (PlacePartyRoleAssoc)</text>

    <!-- status -->
    <text x="690" y="61" fill="#9fb8d0" font-size="12.5">Status</text>
    <text x="690" y="84" fill="#7fe0b0" font-size="12">✓ 4 / 4 layers loaded</text>
    <text x="690" y="104" fill="#7fe0b0" font-size="12">✓ all 4 joints wired</text>
    <text x="690" y="124" fill="#7fe0b0" font-size="12">✓ TMF672 merged · TMF699 fixed</text>
    <text x="690" y="144" fill="#e6b85c" font-size="12">⚠ framework baseline mixed (23.5 / 24.0)</text>
  </g>
</svg>
