#
# Single Redis instance for development/single-node deployments.
# For production: replace with Redis Sentinel or Redis Cluster.
#
# Implements: RFC 9315 §4 P1 — IBS shall maintain a Single Source of Truth
# for the intent, persistent across restarts.
#
# Key patterns (set by IntentStore.ts):
#   intent:{intentId}       TTL 90 days — TMF921 Intent object
#   intentSpec:{specId}     TTL 90 days — TMF921 IntentSpecification object
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: intent-platform
  labels:
    app: redis
    component: intent-sot
    tier: persistence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: intent-sot
        tier: persistence
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7.4.7-alpine
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        # Enable AOF persistence — survives pod restarts within the same node
        command: ["redis-server", "--appendonly", "yes"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 999
          capabilities:
            drop:
            - ALL
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: intent-platform
  labels:
    app: redis
    component: intent-sot
spec:
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP
