kind: ConfigMap
metadata:
  name: knowledge-graph-mcp-server-patch
  namespace: intent-platform

---
# Strategic merge patch — mounts patched server.js over the image's original.
# This is idempotent: re-applying only updates the ConfigMap content.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-graph-mcp
  namespace: intent-platform
spec:
  template:
    spec:
      volumes:
        - name: server-patch
          configMap:
            name: knowledge-graph-mcp-server-patch
      containers:
        - name: knowledge-graph-mcp
          volumeMounts:
            - name: server-patch
              mountPath: /app/dist/server.js
              subPath: server.js
