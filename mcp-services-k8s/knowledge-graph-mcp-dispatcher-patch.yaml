#
# Patches the knowledge-graph-mcp-service image (vpnet/knowledge-graph-mcp-service:2.0.0)
# to expose a unified /mcp/tools/call dispatcher endpoint, matching the MCPClient
# interface used by the business-intent-agent.
#
# Root cause fixed (2026-02-24):
#   knowledge-graph-mcp v2.0.0 registers individual routes (/mcp/tools/<name>)
#   but MCPClient always POSTs to /mcp/tools/call with { tool, params }.
#   The dispatcher also handles the base_products → getBundleRecommendations
#   parameter mapping used by intent-processor Step 4 (Find related products/bundles).
#
# Implements: RFC 9315 §5.1.3 Orchestration — knowledge graph capability exposure
# TMF921: product catalog and bundle resolution used in POST /intent pipeline
# Verified: O2C test PASS — lifecycleStatus: "completed", reportState: "fulfilled"
#
# Apply order:
#   1. kubectl apply -f knowledge-graph-mcp-dispatcher-patch.yaml
#   2. kubectl rollout restart deployment/knowledge-graph-mcp -n intent-platform

apiVersion: v1
data:
  server.js: |-
    "use strict";
    /**
     * Knowledge Graph MCP Server
     * Version 2.0.0 - RDF Support
     *
     * MCP server for querying Neo4j RDF-compliant product catalog
     * with TMF620 and Schema.org standards.
     */
    var __importDefault = (this && this.__importDefault) || function (mod) {
