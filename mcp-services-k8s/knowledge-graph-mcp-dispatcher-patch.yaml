     * Health check endpoint
     */
    app.get('/health', async (req, res) => {
        try {
            const session = driver.session();
            await session.run('RETURN 1');
            await session.close();
            res.json({ status: 'healthy', version: '2.0.0', timestamp: new Date().toISOString() });
        }
        catch (error) {
            const errorMessage = error instanceof Error ? error.message : 'Unknown error';
            res.status(503).json({ status: 'unhealthy', error: errorMessage });
        }
    });
    /**
     * Readiness check endpoint
     */
    app.get('/ready', async (req, res) => {
        try {
            const session = driver.session();
            // Verify RDF indexes exist
            const result = await session.run(`
          SHOW INDEXES
          YIELD name, state
          WHERE name STARTS WITH 'rdf_'
             OR name STARTS WITH 'tmf620_'
             OR name STARTS WITH 'intent_'
             OR name STARTS WITH 'dc_'
             OR name CONTAINS 'fulltext'
          RETURN count(name) AS indexCount
        `);
            await session.close();
            const indexCount = result.records[0]?.get('indexCount').toNumber() || 0;
            if (indexCount >= 17) {
                res.json({ ready: true, indexes: indexCount });
            }
            else {
                res.status(503).json({ ready: false, indexes: indexCount, required: 17 });
            }
        }
        catch (error) {
            const errorMessage = error instanceof Error ? error.message : 'Unknown error';
            res.status(503).json({ ready: false, error: errorMessage });
        }
    });
    /**
     * Metrics endpoint for Prometheus
     */
    app.get('/metrics', async (req, res) => {
        res.set('Content-Type', 'text/plain');
        res.send(await metrics.registry.metrics());
    });
    /**
     * MCP unified dispatcher — /mcp/tools/call
     * Maps { tool, params } to individual tool handlers.
     * Bridges MCPClient (which always POSTs to /mcp/tools/call)
     * to this service's individual tool routes.
     */
    app.post('/mcp/tools/call', async (req, res) => {
        const { tool, params = {} } = req.body;
        const startTime = Date.now();
        try {
            let results;
            if (tool === 'find_related_products') {
                // MCPClient sends { base_products: [...] } (product type array).
                // getBundleRecommendations is the right query when no single productId is known.
                if (params.base_products && !params.productId) {
                    results = await tools.getBundleRecommendations({
                        productId: null,
                        intent: null,
                        maxPrice: params.maxPrice || null
                    });
                } else {
                    results = await tools.findRelatedProducts({ productId: params.productId });
                }
            } else if (tool === 'search_product_catalog') {
                results = await tools.searchProductCatalog(params);
