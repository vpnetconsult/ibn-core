---
# VirtualService — Anthropic API egress
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: anthropic-api-vs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
    managed-by: istio
spec:
  hosts:
  - api.anthropic.com
  http:
  - timeout: 120s
    retries:
      attempts: 2
      perTryTimeout: 60s
      retryOn: 5xx,reset,connect-failure
    route:
    - destination:
        host: api.anthropic.com
        port:
          number: 443
{{- end }}
