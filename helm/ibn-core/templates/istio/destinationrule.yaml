{{- if .Values.istio.enabled }}
# DestinationRule — ibn-core main service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "ibn-core.fullname" . }}-dr
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
    managed-by: istio
spec:
  host: {{ include "ibn-core.serviceFQDN" . }}
  trafficPolicy:
    loadBalancer:
      simple: LEAST_REQUEST  # Better for AI workloads with variable latency
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 3s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
  subsets:
  - name: v1
    labels:
      version: {{ .Values.component.version | quote }}
---
# DestinationRule — BSS/OSS MCP service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: bss-oss-mcp-dr
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
    managed-by: istio
spec:
  host: bss-oss-mcp-service.{{ .Values.namespace }}.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 2s
      http:
        http1MaxPendingRequests: 25
        http2MaxRequests: 50
        maxRequestsPerConnection: 5
    outlierDetection:
      consecutiveErrors: 3
      interval: 20s
      baseEjectionTime: 20s
      maxEjectionPercent: 100
---
