---
# DestinationRule — Anthropic API (external)
# TLS mode DISABLE: Anthropic SDK originates TLS; Istio must not re-wrap
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: anthropic-api-dr
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
    managed-by: istio
spec:
  host: api.anthropic.com
  trafficPolicy:
    tls:
      mode: {{ .Values.istio.anthropicApi.tlsMode }}
    connectionPool:
      tcp:
        maxConnections: 10
        connectTimeout: 10s
      http:
        http2MaxRequests: 10
{{- end }}
