apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ibn-core.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PORT: {{ .Values.config.port | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  CLAUDE_MODEL: {{ .Values.config.claudeModel | quote }}
  CLAUDE_MAX_TOKENS: {{ .Values.config.claudeMaxTokens | quote }}
  CLAUDE_TEMPERATURE: {{ .Values.config.claudeTemperature | quote }}
  MCP_TIMEOUT_MS: {{ .Values.config.mcpTimeoutMs | quote }}
  MCP_RETRY_ATTEMPTS: {{ .Values.config.mcpRetryAttempts | quote }}
  DEFAULT_CURRENCY: {{ .Values.config.defaultCurrency | quote }}
  MIN_ORDER_VALUE: {{ .Values.config.minOrderValue | quote }}
  MAX_BUNDLE_PRODUCTS: {{ .Values.config.maxBundleProducts | quote }}
  # UC007 External Authentication (non-secret settings)
  AUTH_MODE: {{ .Values.auth.mode | quote }}
  {{- if .Values.auth.jwt.issuerUrl }}
  OIDC_ISSUER_URL: {{ .Values.auth.jwt.issuerUrl | quote }}
  {{- end }}
  {{- if and (not .Values.canvas.identityConfig.enabled) .Values.auth.jwt.audience }}
  OIDC_AUDIENCE: {{ .Values.auth.jwt.audience | quote }}
  {{- end }}
  OIDC_JWKS_CACHE_MAX_AGE_MS: {{ .Values.auth.jwt.jwksCacheMaxAgeMs | quote }}
  OIDC_JWKS_COOLDOWN_MS: {{ .Values.auth.jwt.jwksCooldownMs | quote }}
  OIDC_CLOCK_TOLERANCE_SEC: {{ .Values.auth.jwt.clockToleranceSec | quote }}
  # UC006 — Custom Observability (non-secret OTel config; headers carry
  # the LangSmith API key and are wired via deployment envFrom Secret).
  OTEL_ENABLED: {{ .Values.observability.otel.enabled | quote }}
  OTEL_SERVICE_NAME: {{ .Values.observability.otel.serviceName | quote }}
  OTEL_SERVICE_VERSION: {{ .Values.component.version | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  {{- if .Values.observability.otel.resourceAttributes }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.observability.otel.resourceAttributes | quote }}
  {{- end }}
