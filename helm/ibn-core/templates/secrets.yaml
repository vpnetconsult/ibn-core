apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ibn-core.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic-api-key: {{ required "secrets.anthropicApiKey is required" .Values.secrets.anthropicApiKey | quote }}
  default-api-key: {{ .Values.secrets.defaultApiKey | quote }}
  admin-secret: {{ required "secrets.adminSecret is required" .Values.secrets.adminSecret | quote }}
  pii-hash-salt: {{ required "secrets.piiHashSalt is required" .Values.secrets.piiHashSalt | quote }}
  mcp-bss-url: {{ .Values.secrets.mcpBssUrl | quote }}
  mcp-knowledge-graph-url: {{ .Values.secrets.mcpKnowledgeGraphUrl | quote }}
  mcp-customer-data-url: {{ .Values.secrets.mcpCustomerDataUrl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-api-keys
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  MCP_API_KEY_BUSINESS_INTENT: {{ .Values.secrets.mcpApiKeyBusinessIntent | quote }}
