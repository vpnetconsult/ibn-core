apiVersion: v1
kind: Service
metadata:
  name: {{ include "ibn-core.fullname" . }}-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ibn-core.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ibn-core.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None
