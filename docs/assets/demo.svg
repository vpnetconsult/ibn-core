<svg viewBox="0 0 740 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ibn-core O2C intent demo">
  <defs>
    <style>
      .mono { font-family: 'Menlo','Cascadia Code','Fira Code','Courier New',monospace; font-size: 12.5px; }
      .sm   { font-family: 'Menlo','Cascadia Code','Fira Code','Courier New',monospace; font-size: 11.5px; }
      .ui   { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
      .prompt  { fill: #50fa7b; }
      .cmd     { fill: #f8f8f2; }
      .flag    { fill: #8be9fd; }
      .strval  { fill: #f1fa8c; }
      .jsonkey { fill: #8be9fd; }
      .jsonstr { fill: #ff79c6; }
      .jsonnum { fill: #bd93f9; }
      .jsonbool{ fill: #ffb86c; }
      .punct   { fill: #f8f8f2; opacity: 0.6; }
      .dim     { fill: #6272a4; }
      .ok      { fill: #50fa7b; }
      .badge-b { fill: #1a1a2e; }
      .badge-t { fill: #f8f8f2; font-size: 10px; }

      /* staggered fade-in for each line */
      .l0  { animation: slide 0.25s 0.2s  ease both; }
      .l1  { animation: slide 0.25s 0.5s  ease both; }
      .l2  { animation: slide 0.25s 0.8s  ease both; }
      .l3  { animation: slide 0.25s 1.1s  ease both; }
      .l4  { animation: slide 0.25s 1.4s  ease both; }
      .sep { animation: slide 0.25s 1.6s  ease both; }
      .r0  { animation: slide 0.20s 1.8s  ease both; }
      .r1  { animation: slide 0.20s 2.0s  ease both; }
      .r2  { animation: slide 0.20s 2.2s  ease both; }
      .r3  { animation: slide 0.20s 2.4s  ease both; }
      .r4  { animation: slide 0.20s 2.6s  ease both; }
      .r5  { animation: slide 0.20s 2.8s  ease both; }
      .r6  { animation: slide 0.20s 3.0s  ease both; }
      .r7  { animation: slide 0.20s 3.2s  ease both; }
      .r8  { animation: slide 0.20s 3.4s  ease both; }
      .r9  { animation: slide 0.20s 3.6s  ease both; }
      .r10 { animation: slide 0.20s 3.8s  ease both; }
      .r11 { animation: slide 0.20s 4.0s  ease both; }
      .r12 { animation: slide 0.20s 4.2s  ease both; }
      .r13 { animation: slide 0.20s 4.4s  ease both; }
      /* card panels */
      .card-b { animation: fadein 0.4s 1.9s ease both; }
      .card-s { animation: fadein 0.4s 2.8s ease both; }
      .card-r { animation: fadein 0.4s 3.7s ease both; }
      .done   { animation: fadein 0.5s 4.6s ease both; }

      @keyframes slide {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
    <!-- card fill gradients -->
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a3e"/>
      <stop offset="1" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a2e1a"/>
      <stop offset="1" stop-color="#0d1f0d"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2e1a1a"/>
      <stop offset="1" stop-color="#1f0d0d"/>
    </linearGradient>
  </defs>

  <!-- ── Window shell ─────────────────────────────────────── -->
  <rect width="740" height="560" rx="12" fill="#282a36"/>

  <!-- title bar -->
  <rect width="740" height="42" rx="12" fill="#1e1f29"/>
  <rect y="30" width="740" height="12" fill="#1e1f29"/>

  <!-- traffic lights -->
  <circle cx="28" cy="21" r="7" fill="#ff5555"/>
  <circle cx="54" cy="21" r="7" fill="#ffb86c"/>
  <circle cx="80" cy="21" r="7" fill="#50fa7b"/>

  <!-- window title -->
  <text x="370" y="26" text-anchor="middle" class="ui" font-size="13" fill="#f8f8f2" opacity="0.75">ibn-core — RFC 9315 O2C Intent Demo</text>

  <!-- ── CURL COMMAND (left column) ───────────────────────── -->
  <!-- lx = left margin, ly = first line y, step = 19 -->

  <!-- line 0: prompt + curl -->
  <g class="l0 mono">
    <text x="20" y="72" class="prompt">❯</text>
    <text x="36" y="72" class="cmd">curl -sX POST http://localhost:8080/api/v1/intent \</text>
  </g>

  <!-- line 1: -H Authorization -->
  <g class="l1 mono">
    <text x="36" y="91" class="flag">  -H </text>
    <text x="76" y="91" class="strval">'Authorization: Bearer dev-api-key-12345'</text>
    <text x="454" y="91" class="cmd"> \</text>
  </g>

  <!-- line 2: -H Content-Type -->
  <g class="l2 mono">
    <text x="36" y="110" class="flag">  -H </text>
    <text x="76" y="110" class="strval">'Content-Type: application/json'</text>
    <text x="360" y="110" class="cmd"> \</text>
  </g>

  <!-- line 3: -d payload -->
  <g class="l3 mono">
    <text x="36" y="129" class="flag">  -d </text>
    <text x="76" y="129" class="strval">'{"customerId":"CUST-12345","intent":"I need internet for WFH"}'</text>
  </g>

  <!-- blank line 4 -->
  <g class="l4 mono">
    <text x="20" y="148" class="dim"># ↓ ~15s — Claude O2C pipeline running…</text>
  </g>

  <!-- separator -->
  <line x1="20" y1="160" x2="720" y2="160" stroke="#44475a" stroke-width="1" class="sep"/>

  <!-- ── THREE-LAYER RESPONSE CARDS ───────────────────────── -->

  <!-- ▌ BUSINESS LAYER card -->
  <g class="card-b">
    <rect x="18" y="168" width="222" height="158" rx="6" fill="url(#gb)" stroke="#4444aa" stroke-width="1"/>
    <rect x="18" y="168" width="222" height="22" rx="6" fill="#3333aa" opacity="0.4"/>
    <rect x="18" y="178" width="222" height="12" fill="#3333aa" opacity="0.4"/>
    <text x="30" y="183" class="ui" font-size="10" fill="#8be9fd" font-weight="600" letter-spacing="1">BUSINESS LAYER</text>
    <text x="210" y="183" class="ui" font-size="10" fill="#6272a4">RFC §5.1.1</text>

    <!-- intent_analysis -->
    <text x="30" y="202" class="sm jsonkey">"intent_analysis"</text><text x="147" y="202" class="sm punct">: {</text>
    <text x="42" y="218" class="sm jsonkey">"tags"</text><text x="84" y="218" class="sm punct">: [</text>
    <text x="100" y="218" class="sm jsonstr">"wfh"</text><text x="128" y="218" class="sm punct">,</text>
    <text x="134" y="218" class="sm jsonstr">"broadband"</text><text x="198" y="218" class="sm punct">]</text>
    <text x="42" y="234" class="sm jsonkey">"priority"</text><text x="105" y="234" class="sm punct">: [</text>
    <text x="118" y="234" class="sm jsonstr">"speed"</text><text x="156" y="234" class="sm punct">,</text>
    <text x="162" y="234" class="sm jsonstr">"uplink"</text><text x="203" y="234" class="sm punct">]</text>
    <text x="30" y="250" class="sm punct">}</text>

    <!-- lifecycleStatus + reportState -->
    <text x="30" y="268" class="sm jsonkey">"lifecycleStatus"</text><text x="170" y="268" class="sm punct">:</text>
    <text x="180" y="268" class="sm ok">"completed"</text>
    <text x="30" y="284" class="sm jsonkey">"reportState"</text><text x="140" y="284" class="sm punct">:</text>
    <text x="150" y="284" class="sm ok">"fulfilled"</text>

    <!-- processing time -->
    <text x="30" y="318" class="sm dim">"processing_ms": </text><text x="155" y="318" class="sm jsonnum">14 382</text>
  </g>

  <!-- ▌ SERVICE LAYER card -->
  <g class="card-s">
    <rect x="252" y="168" width="228" height="158" rx="6" fill="url(#gs)" stroke="#225522" stroke-width="1"/>
    <rect x="252" y="168" width="228" height="22" rx="6" fill="#225522" opacity="0.5"/>
    <rect x="252" y="178" width="228" height="12" fill="#225522" opacity="0.5"/>
    <text x="264" y="183" class="ui" font-size="10" fill="#50fa7b" font-weight="600" letter-spacing="1">SERVICE LAYER</text>
    <text x="450" y="183" class="ui" font-size="10" fill="#6272a4">RFC §5.1.3</text>

    <text x="264" y="202" class="sm jsonkey">"recommended_offer"</text><text x="398" y="202" class="sm punct">: {</text>
    <text x="276" y="218" class="sm jsonkey">"product"</text><text x="335" y="218" class="sm punct">:</text>
    <text x="345" y="218" class="sm jsonstr">"1Gbps Fibre"</text>
    <text x="276" y="234" class="sm jsonkey">"price"</text><text x="319" y="234" class="sm punct">:</text>
    <text x="330" y="234" class="sm jsonnum">54.99</text>
    <text x="276" y="250" class="sm jsonkey">"currency"</text><text x="340" y="250" class="sm punct">:</text>
    <text x="350" y="250" class="sm jsonstr">"EUR"</text>
    <text x="276" y="266" class="sm jsonkey">"discount"</text><text x="343" y="266" class="sm punct">:</text>
    <text x="353" y="266" class="sm jsonstr">"25% / 3 mo"</text>
    <text x="264" y="282" class="sm punct">}</text>

    <text x="264" y="302" class="sm jsonkey">"bundle"</text><text x="310" y="302" class="sm punct">:</text>
    <text x="321" y="302" class="sm jsonstr">"WFH Premium"</text>
    <text x="264" y="318" class="sm jsonkey">"savings"</text><text x="315" y="318" class="sm punct">:</text>
    <text x="325" y="318" class="sm jsonnum">9.79</text>
    <text x="357" y="318" class="sm dim">EUR / mo</text>
  </g>

  <!-- ▌ RESOURCE LAYER card -->
  <g class="card-r">
    <rect x="492" y="168" width="228" height="158" rx="6" fill="url(#gr)" stroke="#552222" stroke-width="1"/>
    <rect x="492" y="168" width="228" height="22" rx="6" fill="#552222" opacity="0.5"/>
    <rect x="492" y="178" width="228" height="12" fill="#552222" opacity="0.5"/>
    <text x="504" y="183" class="ui" font-size="10" fill="#ff79c6" font-weight="600" letter-spacing="1">RESOURCE LAYER</text>
    <text x="690" y="183" class="ui" font-size="10" fill="#6272a4">BSS</text>

    <text x="504" y="202" class="sm jsonkey">"quote"</text><text x="548" y="202" class="sm punct">: {</text>
    <text x="516" y="218" class="sm jsonkey">"id"</text><text x="537" y="218" class="sm punct">:</text>
    <text x="548" y="218" class="sm jsonstr">"QTE-17719…"</text>
    <text x="516" y="234" class="sm jsonkey">"monthly"</text><text x="575" y="234" class="sm punct">:</text>
    <text x="585" y="234" class="sm jsonnum">54.99</text>
    <text x="516" y="250" class="sm jsonkey">"install"</text><text x="567" y="250" class="sm punct">:</text>
    <text x="577" y="250" class="sm ok">FREE</text>
    <text x="516" y="266" class="sm jsonkey">"valid_until"</text><text x="598" y="266" class="sm punct">:</text>
    <text x="504" y="282" class="sm jsonstr" text-anchor="start">"2026-03-26"</text>
    <text x="504" y="298" class="sm punct">}</text>

    <text x="504" y="318" class="sm jsonkey">"customer"</text><text x="560" y="318" class="sm punct">:</text>
    <text x="570" y="318" class="sm jsonstr">"CUST-12345"</text>
  </g>

  <!-- ── JSON response lines (bottom, scrolling) ──────────── -->

  <!-- intentId line -->
  <g class="r0 mono">
    <text x="20" y="348" class="dim">{</text>
  </g>
  <g class="r1 mono">
    <text x="20" y="367" class="dim">  </text>
    <text x="36" y="367" class="jsonkey">"intentId"</text>
    <text x="108" y="367" class="punct">: </text>
    <text x="122" y="367" class="jsonstr">"1eead22d-7c03-4acf-a1c7-802a49ff338c"</text>
    <text x="530" y="367" class="punct">,</text>
  </g>
  <g class="r2 mono">
    <text x="36" y="386" class="jsonkey">"lifecycleStatus"</text>
    <text x="185" y="386" class="punct">: </text>
    <text x="199" y="386" class="ok">"completed"</text>
    <text x="270" y="386" class="punct">,</text>
  </g>
  <g class="r3 mono">
    <text x="36" y="405" class="jsonkey">"reportState"</text>
    <text x="148" y="405" class="punct">: </text>
    <text x="162" y="405" class="ok">"fulfilled"</text>
    <text x="230" y="405" class="punct">,</text>
  </g>
  <g class="r4 mono">
    <text x="36" y="424" class="jsonkey">"href"</text>
    <text x="82" y="424" class="punct">: </text>
    <text x="96" y="424" class="jsonstr">"/tmf-api/intentManagement/v5/intent/1eead22d…"</text>
    <text x="570" y="424" class="punct">,</text>
  </g>
  <g class="r5 mono">
    <text x="36" y="443" class="jsonkey">"processing_time_ms"</text>
    <text x="215" y="443" class="punct">: </text>
    <text x="229" y="443" class="jsonnum">14382</text>
  </g>
  <g class="r6 mono">
    <text x="20" y="462" class="dim">}</text>
  </g>

  <!-- ── STATUS / DONE line ────────────────────────────────── -->
  <g class="done">
    <rect x="18" y="476" width="704" height="62" rx="6" fill="#1a2e1a" stroke="#50fa7b" stroke-width="1" opacity="0.8"/>
    <text x="36" y="496" class="ui" font-size="11" fill="#50fa7b" font-weight="700">✓  O2C PIPELINE COMPLETE</text>

    <!-- badge row inside status bar -->
    <!-- lifecycleStatus badge -->
    <rect x="36"  y="504" width="100" height="16" rx="3" fill="#225522"/>
    <text x="86"  y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#50fa7b">lifecycleStatus: completed</text>

    <!-- reportState badge -->
    <rect x="144" y="504" width="88" height="16" rx="3" fill="#225522"/>
    <text x="188" y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#50fa7b">reportState: fulfilled</text>

    <!-- RFC badge -->
    <rect x="240" y="504" width="74" height="16" rx="3" fill="#1a1a3e"/>
    <text x="277" y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#8be9fd">RFC 9315 §5.1.3</text>

    <!-- TMF badge -->
    <rect x="322" y="504" width="80" height="16" rx="3" fill="#2e1a2e"/>
    <text x="362" y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#ff79c6">TMF921 83/83 CTK</text>

    <!-- Redis badge -->
    <rect x="410" y="504" width="72" height="16" rx="3" fill="#2e1a1a"/>
    <text x="446" y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#ff79c6">Redis SSoT P1</text>

    <!-- ProbeIntent badge -->
    <rect x="490" y="504" width="84" height="16" rx="3" fill="#1a2a2e"/>
    <text x="532" y="515" text-anchor="middle" class="ui" font-size="9.5" fill="#8be9fd">ProbeIntent P2</text>
  </g>
</svg>
